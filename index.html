<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Доска задач | Билайн</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  
  <!-- ПОДКЛЮЧЕНИЕ FIREBASE (СТРОГО ЭТОТА ВЕРСИЯ) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  
  <!-- ТВОЙ СКРИПТ (СЮДА НУЖНО ВСТАВИТЬ КОД НИЖЕ) -->
  <script src="js/script.js"></script>
</head>
<body>
  <!-- ТЕЛО СТРАНИЦЫ ОСТАЕТСЯ БЕЗ ИЗМЕНЕНИЙ (если у тебя уже есть HTML) -->
  <!-- Если у тебя нет HTML, вот структура (замени всё содержимое body) -->
  <header>
    <h1>
      <div class="header-icon"><i class="fa-solid fa-bullseye"></i></div>
      Доска задач | Контроль качества
    </h1>
    <div class="header-info">Frankfurt am Main | <span class="bee-logo-text">BEELINE AI</span></div>
  </header>
  <div class="toolbar">
    <div class="stats-indicator" id="statsDisplay">
      <span class="stat-item"><i class="fa-solid fa-circle-exclamation" style="color: #E31E24;"></i> <span id="count-overdue">0</span></span>
      <span class="stat-item"><i class="fa-solid fa-spinner" style="color: #FFCC00;"></i> <span id="count-active">0</span></span>
    </div>
    <button type="button" id="toggleFormBtn" class="btn-add"><i class="fa-solid fa-plus"></i> Добавить задачу</button>
    <button type="button" id="exportBtn" class="btn-export"><i class="fa-solid fa-file-excel"></i> Скачать Excel</button>
  </div>
  <div id="taskFormContainer" class="modal-overlay">
    <div class="modal">
      <h2><i class="fa-solid fa-pen-to-square"></i> Новая задача</h2>
      <form id="taskForm">
        <div class="form-row">
          <div class="form-group">
            <label for="taskType">Секция</label>
            <select id="taskType" required>
              <option value="operations">Операционные</option>
              <option value="projects">Проектные</option>
              <option value="long-term">Долгосрочные</option>
            </select>
          </div>
          <div class="form-group">
            <label for="assignee">Ответственный</label>
            <input type="text" id="assignee" list="assignee-list" placeholder="Имя..." required />
            <datalist id="assignee-list">
              <option value="Сизухина Дарья"><option value="Семенова Дарья"><option value="Котяхова Анастасия"><option value="Батина Анастасия"><option value="Чернова Антонина"><option value="Сопова Надежда"><option value="Вы (Руководитель)">
            </datalist>
          </div>
        </div>
        <div class="form-group">
          <label for="taskTitle">Название задачи</label>
          <input type="text" id="taskTitle" placeholder="Введите название задачи..." required />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="dueDate">Срок выполнения</label>
            <input type="date" id="dueDate" required />
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" id="cancelFormBtn" class="btn-cancel">Отмена</button>
          <button type="submit" class="btn-submit">Сохранить</button>
        </div>
      </form>
    </div>
  </div>
  <div class="board-wrapper">
    <div class="board-section" id="section-operations">
      <div class="section-header"><div class="section-title header-accent"><i class="fa-solid fa-screwdriver-wrench"></i> Операционные</div><span class="count-badge" id="count-operations">0</span></div>
      <div class="excel-grid"><table class="excel-table"><thead><tr><th width="5%">№</th><th width="40%">Название задачи</th><th width="20%">Срок</th><th width="20%">Ответственный</th><th width="15%">Статус</th></tr></thead><tbody id="body-operations"></tbody></table></div>
    </div>
    <div class="board-section" id="section-projects">
      <div class="section-header"><div class="section-title header-accent"><i class="fa-solid fa-project-diagram"></i> Проектные</div><span class="count-badge" id="count-projects">0</span></div>
      <div class="excel-grid"><table class="excel-table"><thead><tr><th width="5%">№</th><th width="40%">Название задачи</th><th width="20%">Срок</th><th width="20%">Ответственный</th><th width="15%">Статус</th></tr></thead><tbody id="body-projects"></tbody></table></div>
    </div>
    <div class="board-section" id="section-longterm">
      <div class="section-header"><div class="section-title header-accent"><i class="fa-solid fa-calendar-check"></i> Долгосрочные</div><span class="count-badge" id="count-longterm">0</span></div>
      <div class="excel-grid"><table class="excel-table"><thead><tr><th width="5%">№</th><th width="40%">Название задачи</th><th width="20%">Срок</th><th width="20%">Ответственный</th><th width="15%">Статус</th></tr></thead><tbody id="body-longterm"></tbody></table></div>
    </div>
    <div class="archive-section" id="archive-section">
      <div class="archive-header" onclick="toggleArchive()"><div class="archive-title"><i class="fa-solid fa-box-archive"></i> Архив задач (Закрыто)</div><div class="archive-toggle" id="archiveToggleIcon">▼</div></div>
      <div class="archive-content" id="archive-content"></div>
    </div>
  </div>
</body>
</html>
